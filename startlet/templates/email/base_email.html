<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family: Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; max-width:600px; width:100%;">

          <tr>
            <td align="center" style="background-color:#000000; padding:28px 24px;">
              <img src="{{ logo_url }}" alt="Starlet Fitness" width="160" style="display:block; max-width:160px; height:auto; border:0;">
            </td>
          </tr>

          <tr>
            <td style="background-color:#E4032B; height:4px; line-height:4px; font-size:0;">&nbsp;</td>
          </tr>

          <tr>
            <td style="padding:32px 32px 8px 32px;">
              {% if heading %}
              <h1 style="margin:0 0 16px 0; font-size:20px; color:#111111; font-family: Arial, Helvetica, sans-serif;">{{ heading }}</h1>
              {% endif %}
              <div style="font-size:15px; line-height:1.6; color:#333333;">
                {{ content|safe }}
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 32px 32px 32px;">
              <hr style="border:none; border-top:1px solid #eeeeee; margin:0 0 16px 0;">
              <p style="margin:0; font-size:12px; color:#999999; line-height:1.5;">
                &copy; {% now "Y" %} Starlet Fitness. All rights reserved.<br>
                This is an automated message, please do not reply directly to this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
